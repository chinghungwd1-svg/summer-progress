<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翰林輔才115 暑期進度追蹤</title>
    <style>
        /* ===== 全域設定 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft YaHei', sans-serif;
            background: #f5f7fb;
            color: #1a2332;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ===== 標頭 ===== */
        .header {
            background: linear-gradient(135deg, #1a3a5c, #2a5f7a);
            color: #fff;
            padding: 24px 30px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .header .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }
        .header-right {
            text-align: right;
        }
        .header-right .today {
            font-size: 18px;
            font-weight: 600;
        }
        .header-right .week-info {
            font-size: 14px;
            opacity: 0.85;
        }

        /* ===== 統計看板 ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
        }
        .stat-card .num {
            font-size: 28px;
            font-weight: 700;
            color: #1a3a5c;
        }
        .stat-card .label {
            font-size: 13px;
            color: #6b7a8f;
            margin-top: 2px;
        }
        .stat-card .bar {
            margin-top: 8px;
            height: 6px;
            background: #e9ecf0;
            border-radius: 4px;
            overflow: hidden;
        }
        .stat-card .bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #2a7f5a, #4caf84);
            border-radius: 4px;
            transition: width 0.3s;
        }

        /* ===== 工具列 ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .toolbar .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .toolbar button {
            padding: 8px 18px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: #e9ecf0;
            color: #1a2332;
            transition: all 0.2s;
        }
        .toolbar button:hover {
            background: #d5dbe3;
        }
        .toolbar button.active {
            background: #1a3a5c;
            color: #fff;
        }
        .toolbar .btn-reset {
            background: #fde8e8;
            color: #b33;
            margin-left: auto;
        }
        .toolbar .btn-reset:hover {
            background: #fcd5d5;
        }
        .toolbar .btn-reset-week {
            background: #fff3e0;
            color: #b86b1f;
        }
        .toolbar .btn-reset-week:hover {
            background: #ffe8cc;
        }

        /* ===== 週進度區塊 ===== */
        .week-block {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #eef1f5;
            transition: border-color 0.2s;
        }
        .week-block.completed {
            border-left: 5px solid #4caf84;
        }
        .week-block.incomplete {
            border-left: 5px solid #f5a623;
        }
        .week-header {
            padding: 16px 22px;
            background: #f8faff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }
        .week-header:hover {
            background: #f0f5ff;
        }
        .week-header .week-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a3a5c;
        }
        .week-header .week-date {
            font-size: 14px;
            color: #6b7a8f;
            margin-left: 12px;
        }
        .week-header .week-progress {
            font-size: 14px;
            font-weight: 600;
            color: #2a5f7a;
        }
        .week-body {
            padding: 0 22px 22px 22px;
            display: none;
        }
        .week-body.open {
            display: block;
        }

        /* ===== 每日進度表 ===== */
        .day-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 14px;
        }
        @media (max-width: 768px) {
            .day-grid {
                grid-template-columns: 1fr;
            }
        }
        .day-card {
            background: #fafbfc;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #eef1f5;
        }
        .day-card .day-title {
            font-weight: 700;
            font-size: 15px;
            color: #1a3a5c;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .day-card .day-title .check-all {
            font-size: 13px;
            font-weight: 400;
            color: #6b7a8f;
            cursor: pointer;
        }
        .day-card .day-title .check-all:hover {
            color: #1a3a5c;
        }
        .day-card .subject-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px dashed #eef1f5;
            font-size: 14px;
        }
        .day-card .subject-row:last-child {
            border-bottom: none;
        }
        .day-card .subject-row .subject-label {
            min-width: 44px;
            font-weight: 600;
            color: #2a5f7a;
            font-size: 13px;
        }
        .day-card .subject-row .task {
            flex: 1;
            color: #1a2332;
            font-size: 13px;
            line-height: 1.4;
        }
        .day-card .subject-row .task .done {
            text-decoration: line-through;
            color: #8a9aa8;
        }
        .day-card .subject-row input[type="checkbox"] {
            width: 17px;
            height: 17px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #2a7f5a;
            flex-shrink: 0;
        }
        .day-card .subject-row .task-detail {
            font-size: 12px;
            color: #6b7a8f;
            display: block;
            margin-top: 1px;
        }
        .day-card .subject-row .tag {
            font-size: 11px;
            background: #e9ecf0;
            padding: 0 8px;
            border-radius: 10px;
            color: #4a5a6a;
            display: inline-block;
            margin-right: 4px;
        }
        .day-card .subject-row .tag.review {
            background: #e3f0fa;
            color: #1a5a7a;
        }
        .day-card .subject-row .tag.advance {
            background: #fef3e0;
            color: #a86a1a;
        }

        /* ===== 科目篩選高亮 ===== */
        .filter-highlight .subject-row[data-subject]:not(.show) {
            display: none;
        }

        /* ===== 彈窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 28px 32px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .modal h3 {
            font-size: 18px;
            margin-bottom: 12px;
        }
        .modal p {
            font-size: 14px;
            color: #4a5a6a;
            margin-bottom: 18px;
        }
        .modal .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal .btn-group button {
            padding: 8px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .modal .btn-group .btn-confirm {
            background: #d33;
            color: #fff;
        }
        .modal .btn-group .btn-confirm:hover {
            background: #b22;
        }
        .modal .btn-group .btn-cancel {
            background: #e9ecf0;
            color: #1a2332;
        }
        .modal .btn-group .btn-cancel:hover {
            background: #d5dbe3;
        }

        /* ===== 列印優化 ===== */
        @media print {
            body { background: #fff; padding: 10px; }
            .header { background: #1a3a5c !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .stat-card { box-shadow: none; border: 1px solid #ddd; }
            .week-block { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
            .toolbar .btn-reset, .toolbar .btn-reset-week { display: none; }
            .day-card .subject-row input[type="checkbox"] { accent-color: #2a7f5a; }
            .week-body { display: block !important; }
            .modal-overlay { display: none !important; }
            .day-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

        </div>
    </div>

</div>

    // ============================================================
    //  3. 儲存與讀取
    // ============================================================
    const STORAGE_KEY = 'hl115_progress';

    function loadProgress() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : {};
        } catch { return {}; }
    }

    function saveProgress(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getKey(weekId, date, subject) {
        return `${weekId}_${date}_${subject}`;
    }

    function isChecked(weekId, date, subject) {
        const data = loadProgress();
        return !!data[getKey(weekId, date, subject)];
    }

    function toggleCheck(weekId, date, subject) {
        const data = loadProgress();
        const key = getKey(weekId, date, subject);
        data[key] = !data[key];
        saveProgress(data);
        renderAll();
    }

    function toggleDayAll(weekId, date) {
        const data = loadProgress();
        const dayData = SCHEDULE[weekId]?.days?.[date];
        if (!dayData) return;
        const subjects = Object.keys(dayData);
        const allChecked = subjects.every(s => data[getKey(weekId, date, s)]);
        subjects.forEach(s => {
            data[getKey(weekId, date, s)] = !allChecked;
        });
        saveProgress(data);
        renderAll();
    }

    function resetWeek() {
        // 找出目前所在的週次
        const today = new Date();
        const currentWeek = getCurrentWeekId(today);
        if (!currentWeek) return;
        if (!confirm(`確定要重置「${currentWeek}」的所有進度嗎？`)) return;
        const data = loadProgress();
        const weekData = SCHEDULE[currentWeek]?.days;
        if (!weekData) return;
        Object.keys(weekData).forEach(date => {
            Object.keys(weekData[date]).forEach(subject => {
                delete data[getKey(currentWeek, date, subject)];
            });
        });
        saveProgress(data);
        renderAll();
    }

    function resetAll() {
        localStorage.removeItem(STORAGE_KEY);
        renderAll();
    }

    let resetMode = 'all';

    function showResetModal() {
        resetMode = 'all';
        document.getElementById('resetTargetText').textContent = '全部進度';
        document.getElementById('resetModal').classList.add('active');
    }

    function closeResetModal() {
        document.getElementById('resetModal').classList.remove('active');
    }

    function confirmReset() {
        closeResetModal();
        if (resetMode === 'all') resetAll();
    }

    // ============================================================
    //  4. 計算與統計
    // ============================================================
    function getCurrentWeekId(today) {
        const ds = today.toISOString().slice(0, 10).replace(/-/g, '/');
        for (const w of WEEKS) {
            const [start, end] = w.date.split(' ~ ');
            const [sm, sd] = start.split('/').map(Number);
            const [em, ed] = end.split('/').map(Number);
            const sy = today.getFullYear();
            const ey = today.getFullYear();
            const startDate = new Date(sy, sm - 1, sd);
            const endDate = new Date(ey, em - 1, ed);
            if (today >= startDate && today <= endDate) return w.id;
        }
        // 如果不在任何週次內，回傳 W1
        return 'W1';
    }

    function getAllTasks() {
        const tasks = [];
        for (const weekId of Object.keys(SCHEDULE)) {
            const week = SCHEDULE[weekId];
            for (const date of Object.keys(week.days)) {
                const day = week.days[date];
                for (const subject of Object.keys(day)) {
                    tasks.push({ weekId, date, subject, task: day[subject] });
                }
            }
        }
        return tasks;
    }

    function getStats() {
        const tasks = getAllTasks();
        const total = tasks.length;
        const data = loadProgress();
        let done = 0;
        tasks.forEach(t => {
            if (data[getKey(t.weekId, t.date, t.subject)]) done++;
        });
        return { total, done, percent: total ? Math.round(done / total * 100) : 0 };
    }

    function getWeekStats(weekId) {
        const week = SCHEDULE[weekId];
        if (!week) return { total: 0, done: 0, percent: 0 };
        const tasks = [];
        for (const date of Object.keys(week.days)) {
            for (const subject of Object.keys(week.days[date])) {
                tasks.push({ date, subject });
            }
        }
        const total = tasks.length;
        const data = loadProgress();
        let done = 0;
        tasks.forEach(t => {
            if (data[getKey(weekId, t.date, t.subject)]) done++;
        });
        return { total, done, percent: total ? Math.round(done / total * 100) : 0 };
    }

    function getSubjectStats() {
        const tasks = getAllTasks();
        const data = loadProgress();
        const subjectMap = {};
        tasks.forEach(t => {
            if (!subjectMap[t.subject]) subjectMap[t.subject] = { total: 0, done: 0 };
            subjectMap[t.subject].total++;
            if (data[getKey(t.weekId, t.date, t.subject)]) subjectMap[t.subject].done++;
        });
        let completed = 0;
        for (const s of Object.keys(subjectMap)) {
            if (subjectMap[s].done === subjectMap[s].total) completed++;
        }
        return { completed, total: Object.keys(subjectMap).length };
    }

    // ============================================================
    //  5. 渲染
    // ============================================================
    let currentFilter = 'all';

    function renderAll() {
        renderStats();
        renderWeeks();
        renderToday();
    }

    function renderStats() {
        const stats = getStats();
        document.getElementById('statTotal').textContent = `${stats.done}/${stats.total}`;
        document.getElementById('statTotalBar').style.width = stats.percent + '%';

        // 本週
        const today = new Date();
        const weekId = getCurrentWeekId(today);
        const weekStats = getWeekStats(weekId);
        document.getElementById('statWeek').textContent = weekStats.percent + '%';
        document.getElementById('statWeekBar').style.width = weekStats.percent + '%';

        // 科目
        const subStats = getSubjectStats();
        const subPercent = subStats.total ? Math.round(subStats.completed / subStats.total * 100) : 0;
        document.getElementById('statSubject').textContent = `${subStats.completed}/${subStats.total}`;
        document.getElementById('statSubjectBar').style.width = subPercent + '%';
    }

    function renderToday() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        const wd = weekdays[now.getDay()];
        document.getElementById('todayDisplay').textContent = `${y}/${m}/${d} (${wd})`;

        const weekId = getCurrentWeekId(now);
        const week = WEEKS.find(w => w.id === weekId);
        const stats = getWeekStats(weekId);
        document.getElementById('weekInfo').textContent = week ? `${week.label} ${week.date} · 完成 ${stats.done}/${stats.total}` : '—';
    }

    function renderWeeks() {
        const container = document.getElementById('weekContainer');
        let html = '';
        const data = loadProgress();

        for (const week of WEEKS) {
            const weekId = week.id;
            const weekData = SCHEDULE[weekId];
            if (!weekData) continue;
            const stats = getWeekStats(weekId);
            const isComplete = stats.done === stats.total && stats.total > 0;
            const isPartial = stats.done > 0 && stats.done < stats.total;
            const statusClass = isComplete ? 'completed' : (isPartial ? 'incomplete' : '');

            html += `<div class="week-block ${statusClass}" data-week="${weekId}">`;
            html += `<div class="week-header" onclick="toggleWeek('${weekId}')">`;
            html += `<div><span class="week-title">${week.label}</span><span class="week-date">${week.date}</span></div>`;
            html += `<div class="week-progress">${stats.done}/${stats.total} (${stats.percent}%)</div>`;
            html += `</div>`;
            html += `<div class="week-body" id="weekBody_${weekId}">`;

            // 每日格子
            const dates = Object.keys(weekData.days);
            html += `<div class="day-grid">`;
            for (const date of dates) {
                const dayData = weekData.days[date];
                const dateObj = new Date(date.split('/').map(Number));
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                const wd = weekdays[dateObj.getDay()];
                const isToday = date === new Date().toISOString().slice(5, 10).replace('-', '/');

                // 計算該日完成數
                const subjects = Object.keys(dayData);
                let dayDone = 0;
                subjects.forEach(s => { if (data[getKey(weekId, date, s)]) dayDone++; });
                const allChecked = dayDone === subjects.length && subjects.length > 0;

                html += `<div class="day-card" style="${isToday ? 'border: 2px solid #1a3a5c;' : ''}">`;
                html += `<div class="day-title">`;
                html += `<span>${date} (${wd})${isToday ? ' ⭐今天' : ''}</span>`;
                html += `<span class="check-all" onclick="toggleDayAll('${weekId}','${date}')">${allChecked ? '☑ 全部取消' : '☐ 全部勾選'}</span>`;
                html += `</div>`;

                // 依序顯示各科目
                const subjectOrder = ['國文', '英語', '英語題', '數學', '數學先', '自然', '社會'];
                for (const subject of subjectOrder) {
                    if (!dayData[subject]) continue;
                    const info = dayData[subject];
                    const checked = data[getKey(weekId, date, subject)] || false;
                    const tagClass = info.tag === '複習' ? 'review' : 'advance';
                    const displaySubject = subject === '英語題' ? '英語(題)' : (subject === '數學先' ? '數學(先)' : subject);
                    const displayTask = checked ? `<span class="done">${info.task}</span>` : info.task;

                    // 檢查篩選
                    let show = true;
                    if (currentFilter !== 'all') {
                        if (subject === '英語題' && currentFilter !== '英語') show = false;
                        else if (subject === '數學先' && currentFilter !== '數學') show = false;
                        else if (subject !== '英語題' && subject !== '數學先' && subject !== currentFilter) show = false;
                    }

                    html += `<div class="subject-row ${show ? 'show' : ''}" data-subject="${subject}">`;
                    html += `<input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleCheck('${weekId}','${date}','${subject}')">`;
                    html += `<span class="subject-label">${SUBJECT_ICONS[displaySubject] || ''} ${displaySubject}</span>`;
                    html += `<span class="task"><span class="tag ${tagClass}">${info.tag}</span> ${displayTask}</span>`;
                    html += `</div>`;
                }

                // 睡前回想
                const checkedRecall = data[getKey(weekId, date, '睡前回想')] || false;
                html += `<div class="subject-row show" data-subject="睡前回想" style="border-top: 2px dashed #d5dbe3; margin-top:4px; padding-top:6px;">`;
                html += `<input type="checkbox" ${checkedRecall ? 'checked' : ''} onchange="toggleCheck('${weekId}','${date}','睡前回想')">`;
                html += `<span class="subject-label">🌙</span>`;
                html += `<span class="task">睡前回想 (闔書回答3個問題) ${checkedRecall ? '✅' : ''}</span>`;
                html += `</div>`;

                html += `</div>`;
            }
            html += `</div>`;

            html += `</div>`;
            html += `</div>`;
        }

        container.innerHTML = html;
    }

    function toggleWeek(weekId) {
        const body = document.getElementById(`weekBody_${weekId}`);
        if (body) body.classList.toggle('open');
    }

    // ============================================================
    //  6. 事件綁定
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        // 預設展開當前週
        const today = new Date();
        const currentWeek = getCurrentWeekId(today);
        setTimeout(() => {
            const body = document.getElementById(`weekBody_${currentWeek}`);
            if (body) body.classList.add('open');
        }, 100);

        // 篩選按鈕
        document.querySelectorAll('.filter-group button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-group button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderWeeks();
            });
        });

        // 點擊彈窗外部關閉
        document.getElementById('resetModal').addEventListener('click', function(e) {
            if (e.target === this) closeResetModal();
        });

        renderAll();
    });

    // ============================================================
    //  7. 印出功能（簡易）
    // ============================================================
    console.log('✅ 翰林輔才115 進度追蹤已載入');
    console.log('📊 總任務數:', getAllTasks().length);
    console.log('📈 完成度:', getStats().percent + '%');
