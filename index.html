<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翰林輔才115 暑期進度追蹤</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== 載入遮罩 ===== -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span>同步資料中⋯</span>
    </div>

    <!-- ===== Toast 提示 ===== -->
    <div class="toast" id="toast"></div>

    <div class="container" id="app">

        <!-- ===== 標頭 ===== -->
        <div class="header">
            <div>
                <h1>📚 暑期進度追蹤</h1>
                <div class="subtitle">翰林輔才115 · 升國二 · W1~W9</div>
            </div>
            <div class="header-right">
                <div class="today" id="todayDisplay"></div>
                <div class="sync-status synced" id="syncStatus">☁️ 已同步</div>
            </div>
        </div>

        <!-- ===== 統計看板 ===== -->
        <div class="stats" id="statsContainer">
            <div class="stat-card">
                <div class="num" id="statTotal">0/0</div>
                <div class="label">📊 總完成</div>
                <div class="bar"><div class="fill" id="statTotalBar" style="width:0%"></div></div>
            </div>
            <div class="stat-card">
                <div class="num" id="statWeek">0%</div>
                <div class="label">📅 本週</div>
                <div class="bar"><div class="fill" id="statWeekBar" style="width:0%"></div></div>
            </div>
            <div class="stat-card">
                <div class="num" id="statSubject">0</div>
                <div class="label">🎯 已達標科目</div>
                <div class="bar"><div class="fill" id="statSubjectBar" style="width:0%"></div></div>
            </div>
        </div>

        <!-- ===== 工具列 ===== -->
        <div class="toolbar">
            <button class="mode-btn active-mode" id="modeDay" onclick="switchMode('day')">📋 每日打卡</button>
            <button class="mode-btn" id="modeGantt" onclick="switchMode('gantt')">📊 甘特圖</button>
            <span style="color:#bbb;margin:0 4px;">|</span>
            <div class="filter-group" id="filterGroup">
                <button class="active" data-filter="all">全部</button>
                <button data-filter="國文">國文</button>
                <button data-filter="英語">英語</button>
                <button data-filter="數學">數學</button>
                <button data-filter="自然">自然</button>
                <button data-filter="社會">社會</button>
            </div>
            <button class="btn-sync" onclick="syncWithCloud()">🔄 同步</button>
            <button class="btn-reset" onclick="showResetModal()">🗑 重置</button>
        </div>

        <!-- ===== 甘特圖區 ===== -->
        <div id="ganttContainer"></div>

        <!-- ===== 每日打卡區 ===== -->
        <div id="dayContainer"></div>

        <!-- ===== 重置彈窗 ===== -->
        <div class="modal-overlay" id="resetModal">
            <div class="modal">
                <h3>⚠️ 確認重置</h3>
                <p>確定要清除 <strong>全部</strong> 的進度記錄嗎？<br>此操作無法復原。</p>
                <div class="btn-group">
                    <button class="btn-cancel" onclick="closeResetModal()">取消</button>
                    <button class="btn-confirm" onclick="confirmReset()">確定重置</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
